<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Expenses chart component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="chart-header">
      <p id="balance-label" grid-area="label">My balance</p>
      <p id="balance-amount" grid-area="amount">$921.48</p>
      <img src="./images/logo.svg" alt="logo" id="logo" grid-area="image">
    </div>
    
    <div class="chart">
      <p id="chart-title">Spending - Last 7 days</p>
    
      <div class="chart-bars"></div>

      <hr>

      <div class="chart-footer">
        <div class="total-container">
          <p id="total-header">Total this week</p>
          <p id="weekly-total"></p>
        </div>
        
        <div class="percent">
          <p id="monthly-percent">+2.4%</p>
          <p id="change-label">from last month</p>
        </div>        
      </div>
      
    </div>
  </div>

  
  
  <script src="script.js"></script>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Ashley Boden</a>.
  </footer>
</body>
</html>
